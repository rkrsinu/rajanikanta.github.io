<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>
Background
</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{

    width:100%;
    height:100%;

    overflow:hidden;

    background:#050816;
}

/* ===================================== */
/* CANVAS */
/* ===================================== */

canvas{

    display:block;

    width:100%;
    height:100%;
}

</style>

</head>

<body>

<canvas id="bg"></canvas>

<script>

const canvas =
    document.getElementById("bg");

const ctx =
    canvas.getContext("2d");

let width;
let height;

function resize(){

    width =
        canvas.width =
        window.innerWidth;

    height =
        canvas.height =
        window.innerHeight;
}

resize();

window.addEventListener(
    "resize",
    resize
);

/* ===================================== */
/* PARTICLES */
/* ===================================== */

const particles = [];

const particleCount = 90;

for(let i=0;i<particleCount;i++){

    particles.push({

        x:Math.random()*width,

        y:Math.random()*height,

        r:Math.random()*3+1,

        dx:(Math.random()-0.5)*0.6,

        dy:(Math.random()-0.5)*0.6

    });

}

/* ===================================== */
/* ANIMATION */
/* ===================================== */

function animate(){

    ctx.clearRect(
        0,
        0,
        width,
        height
    );

    // background

    const grad =
        ctx.createLinearGradient(
            0,
            0,
            width,
            height
        );

    grad.addColorStop(
        0,
        "#050816"
    );

    grad.addColorStop(
        1,
        "#0f172a"
    );

    ctx.fillStyle = grad;

    ctx.fillRect(
        0,
        0,
        width,
        height
    );

    // particles

    particles.forEach(p => {

        p.x += p.dx;
        p.y += p.dy;

        if(p.x<0 || p.x>width)
            p.dx *= -1;

        if(p.y<0 || p.y>height)
            p.dy *= -1;

        ctx.beginPath();

        ctx.arc(
            p.x,
            p.y,
            p.r,
            0,
            Math.PI*2
        );

        ctx.fillStyle =
            "rgba(96,165,250,0.8)";

        ctx.fill();

    });

    // lines

    for(let i=0;i<particles.length;i++){

        for(let j=i+1;j<particles.length;j++){

            const a = particles[i];
            const b = particles[j];

            const dist = Math.hypot(
                a.x-b.x,
                a.y-b.y
            );

            if(dist<140){

                ctx.beginPath();

                ctx.moveTo(a.x,a.y);

                ctx.lineTo(b.x,b.y);

                ctx.strokeStyle =
                    `rgba(96,165,250,${
                        1-dist/140
                    })`;

                ctx.lineWidth = 1;

                ctx.stroke();

            }

        }

    }

    requestAnimationFrame(
        animate
    );

}

animate();

</script>

</body>

</html>
